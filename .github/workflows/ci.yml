name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build
        run: |
          clang -o first.exe first.c
          ./first.exe

      - name: Tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ./glos -r sample.glos

      - name: Tests (macOS)
        if: matrix.os == 'macos-latest'
        run: ./glos -r sample.glos

      - name: Tests (Windows)
        if: matrix.os == 'windows-latest'
        run: ./glos.exe -r sample.glos
